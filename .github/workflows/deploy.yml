name: Deploy Frontend

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
        run: npm run build

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build

    env:
      EC2_HOST: ${{ vars.EC2_HOST }}
      EC2_USER: ${{ vars.EC2_USER }}
      EC2_SECURITY_GROUP_ID: ${{ vars.EC2_SECURITY_GROUP_ID }}
      FE_PROJECT_DIR: ${{ vars.FE_PROJECT_DIR }}
      BACKEND_PROJECT_DIR: ${{ vars.BACKEND_PROJECT_DIR }}
      VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Get runner public IP
        id: runner-ip
        run: |
          RUNNER_IP="$(curl -s https://checkip.amazonaws.com)"
          echo "cidr=${RUNNER_IP}/32" >> "$GITHUB_OUTPUT"

      - name: Allow temporary SSH access
        run: |
          aws ec2 authorize-security-group-ingress \
            --group-id "$EC2_SECURITY_GROUP_ID" \
            --protocol tcp \
            --port 22 \
            --cidr "${{ steps.runner-ip.outputs.cidr }}"

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Deploy
        run: |
          ssh -i ~/.ssh/ec2_key "${EC2_USER}@${EC2_HOST}" << EOF
            set -euo pipefail

            cd "${FE_PROJECT_DIR}"
            git pull --ff-only origin main
            npm ci
            VITE_API_BASE_URL="${VITE_API_BASE_URL}" npm run build

            cd "${BACKEND_PROJECT_DIR}"
            docker compose --env-file .env.prod -f docker-compose.prod.yml restart nginx
          EOF

      - name: Revoke temporary SSH access
        if: always()
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id "$EC2_SECURITY_GROUP_ID" \
            --protocol tcp \
            --port 22 \
            --cidr "${{ steps.runner-ip.outputs.cidr }}" || true